# .github/workflows/release.yml
name: CI/CD & Docker Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # --- JOB 1: TEST ---
  test:
    name: Test Build & Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Local Test Image
        run: docker build -t checker:test .

      - name: Run Tool Test
        run: |
          # 1. Create the host directory structure
          mkdir -p ${{ github.workspace }}/data/examples
          mkdir -p ${{ github.workspace }}/outputs

          # 2. Create the test file with specific taxon
          echo "Ancyloscelis_apiformis" > ${{ github.workspace }}/data/examples/minimal.txt
          
          # 3. Run the container
          docker run --rm \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/outputs:/app/outputs \
            --entrypoint python \
            checker:test -m checker --input-file examples/minimal.txt

          # 4. Verify the output exists
          if [ -f "${{ github.workspace }}/outputs/minimal_output_report.json" ]; then
            echo "✅ Test Passed: Output report generated successfully."
            cat ${{ github.workspace }}/outputs/minimal_output_report.json
          else
            echo "❌ Test Failed: Output report not found."
            exit 1
          fi

  # --- JOB 2: RELEASE ---
  release:
    name: Version & Publish
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Release Tools
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release[github]

      - name: Python Semantic Release
        run: python -m semantic_release publish

      - name: Get New Version Tag
        id: get_tag
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "IMAGE_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Versioned Image
        run: |
          # Build using the real version tag
          docker build -t ${DOCKER_HUB_USERNAME}/checker:${{ env.IMAGE_TAG }} .
          docker push ${DOCKER_HUB_USERNAME}/checker:${{ env.IMAGE_TAG }}
          
          # Also update 'latest'
          docker tag ${DOCKER_HUB_USERNAME}/checker:${{ env.IMAGE_TAG }} ${DOCKER_HUB_USERNAME}/checker:latest
          docker push ${DOCKER_HUB_USERNAME}/checker:latest