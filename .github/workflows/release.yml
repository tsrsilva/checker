# .github/workflows/release.yml
name: CI/CD & Docker Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # --- JOB 1: TEST ---
  test:
    name: Test Build & Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Local Test Image
        run: docker build -t checker:test .

      - name: Run Tool Test
        run: |
          # 1. Create the host directory structure
          mkdir -p ${{ github.workspace }}/data/examples
          mkdir -p ${{ github.workspace }}/outputs

          # 2. Create the test file with specific taxon
          echo "Ancyloscelis_apiformis" > ${{ github.workspace }}/data/examples/minimal.txt
          
          # 3. Run the container
          docker run --rm \
            -v ${{ github.workspace }}/data:/app/data \
            -v ${{ github.workspace }}/outputs:/app/outputs \
            --entrypoint python \
            checker:test -m checker --config configs/config.ci.yaml --input-file examples/minimal.txt

          # 4. Verify the output exists
          if [ -f "${{ github.workspace }}/outputs/examples/minimal_output_report.json" ]; then
            echo "✅ Test Passed: Output report generated successfully."
            cat ${{ github.workspace }}/outputs/examples/minimal_output_report.json
          else
            echo "❌ Test Failed: Output report not found."
            exit 1
          fi

  # --- JOB 2: RELEASE ---
  release:
    name: Version & Publish
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Release Tools
        run: |
          python -m pip install --upgrade pip
          pip install "python-semantic-release[github]>=10,<11"

      - name: Plan Semantic Release
        id: release_plan
        run: |
          NEXT_TAG=$(semantic-release version --print-tag)
          LAST_TAG=$(semantic-release version --print-last-released-tag || true)

          echo "next_tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ -n "$LAST_TAG" ] && [ "$NEXT_TAG" = "$LAST_TAG" ]; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "No semantic release is required."
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "image_tag=$NEXT_TAG" >> $GITHUB_OUTPUT
            echo "Releasing $NEXT_TAG"
          fi

      - name: Create Semantic Release
        if: steps.release_plan.outputs.released == 'true'
        run: semantic-release version

      - name: Skip Docker Publish When No Release Is Needed
        if: steps.release_plan.outputs.released != 'true'
        run: echo "No new semantic version detected; skipping Docker publish."

      - name: Log in to Docker Hub
        if: steps.release_plan.outputs.released == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Versioned Image
        if: steps.release_plan.outputs.released == 'true'
        env:
          IMAGE_TAG: ${{ steps.release_plan.outputs.image_tag }}
        run: |
          # Build using the real version tag
          docker build -t ${DOCKER_HUB_USERNAME}/checker:${IMAGE_TAG} .
          docker push ${DOCKER_HUB_USERNAME}/checker:${IMAGE_TAG}
          
          # Also update 'latest'
          docker tag ${DOCKER_HUB_USERNAME}/checker:${IMAGE_TAG} ${DOCKER_HUB_USERNAME}/checker:latest
          docker push ${DOCKER_HUB_USERNAME}/checker:latest