# .github/workflows/docker-release.yml
name: Docker Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest

    env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

    steps:
      # 1. Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
            fetch-depth: 0  # Fetch all history for semantic-release

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3. Install dependencies including semantic-release
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-semantic-release[github]

      # 4. Run semantic-release to bump version & create tag
      - name: Semantic Release
        run: python -m semantic_release publish

      # 5. Get the newly created tag from Git
      - name: Get New Version Tag
        id: get_tag
        run: |
          # Grabs the most recent git tag from the current branch
          NEW_TAG=$(git describe --tags --abbrev=0)
          echo "Discovered new tag: $NEW_TAG"
          # Saves the tag to GitHub output so other steps can use it safely
          echo "IMAGE_TAG=$NEW_TAG" >> $GITHUB_ENV

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.ref_name }}
          echo "Building image checker:${IMAGE_TAG}"
          docker build -t ${DOCKER_HUB_USERNAME}/checker:${IMAGE_TAG} .

      # 7. Log in to Docker Hub
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 8. Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          IMAGE_TAG=${{ github.ref_name }}
          docker push ${DOCKER_HUB_USERNAME}/checker:${IMAGE_TAG}

      # 9. Optional: tag 'latest' for convenience
      - name: Tag latest
        run: |
          docker tag ${DOCKER_HUB_USERNAME}/checker:${{ github.ref_name }} ${DOCKER_HUB_USERNAME}/checker:latest
          docker push ${DOCKER_HUB_USERNAME}/checker:latest
